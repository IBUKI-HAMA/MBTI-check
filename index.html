
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>自治体DX診断結果</title>

<style>
body{
    font-family:sans-serif;
    max-width:700px;
    margin:40px auto;
    padding:20px;
}

h1{
    color:#0078d4;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    background:#0078d4;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
}

.result{
    margin-top:30px;
    padding:20px;
    border:1px solid #ddd;
    display:none;
}

.error{
    color:red;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>自治体DX診断結果</h1>

<label>自治体名（必須）</label>
<input id="city">

<label>部署名（必須）</label>
<input id="dept">

<label>氏名（必須）</label>
<input id="name">

<button onclick="searchResult()">検索</button>

<div id="error" class="error"></div>

<div id="result" class="result">
    <h2 id="type"></h2>

    <h3>おすすめソリューション</h3>
    <p id="solution"></p>
</div>

<script>

async function searchResult(){

    const city = document.getElementById("city").value.trim();
    const dept = document.getElementById("dept").value.trim();
    const name = document.getElementById("name").value.trim();

    if(!city || !dept || !name){

        document.getElementById("result").style.display = "none";

        document.getElementById("error").innerHTML =
            "自治体名・部署名・氏名をすべて入力してください";

        return;
    }

    try{

        const response = await fetch(
            "https://default045dc47ad5a1414fa0077cdb1e3f3d.e7.environment.api.powerplatform.com/powerautomate/automations/direct/cu/23/workflows/2701d707cca449a684f31539bdcc4840/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=f9avoHBUVmSXAincmVXI56XUTuN4Et6qFVy0FrF86ps",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    city: city,
                    dept: dept,
                    name: name
                })
            }
        );

        const result = await response.json();

        document.getElementById("error").innerHTML = "";

        document.getElementById("type").innerHTML =
            "診断タイプ： " + result.type;

        document.getElementById("solution").innerHTML =
            result.solution;

        document.getElementById("result").style.display = "block";

    }
    catch(error){

        document.getElementById("result").style.display = "none";

        document.getElementById("error").innerHTML =
            "通信エラーが発生しました";

        console.error(error);

    }

}

</script>

</body>
</html>
